Edge-Ring:
  - cause: etch_nonuniformity      # 식각 불균일
    process: ETCH
    equipment_group: ETCH
    prob: 0.60
    telemetry_signature: {param: rf_power, drift: step_up}
    citation: "Wang et al., IEEE TSM 2020"
  - cause: cmp_edge_overpolish     # CMP 에지 과연마
    process: CMP
    equipment_group: CMP
    prob: 0.25
    telemetry_signature: {param: down_force, drift: linear_up}
    citation: "NO_CITATION"
  - cause: clean_residue           # 세정 문제
    process: CLEAN
    equipment_group: CLEAN
    prob: 0.15
    telemetry_signature: {param: flow_rate, drift: none}   # 이력에만 단서
    citation: "NO_CITATION"
Center:
  - cause: deposition_center_thickness  # 증착 중앙부 두께 이상
    process: DEPO
    equipment_group: DEPO
    prob: 0.55
    telemetry_signature: {param: chamber_pressure, drift: step_up}
    citation: "Wu et al., IEEE TSM 2015"
  - cause: cmp_center_overpolish        # CMP 중앙 과연마
    process: CMP
    equipment_group: CMP
    prob: 0.25
    telemetry_signature: {param: slurry_flow, drift: linear_up}
    citation: "NO_CITATION"
  - cause: clean_nozzle_clog            # 세정 노즐 막힘 → 중앙 잔류
    process: CLEAN
    equipment_group: CLEAN
    prob: 0.20
    telemetry_signature: {param: flow_rate, drift: linear_down}
    citation: "NO_CITATION"
Scratch:
  - cause: cmp_pad_wear                 # CMP 패드 마모/컨디셔닝 이상
    process: CMP
    equipment_group: CMP
    prob: 0.45
    telemetry_signature: {param: pad_usage_hours, drift: linear_up}
    citation: "Wu et al., IEEE TSM 2015"
  - cause: cmp_slurry_particle          # 슬러리 대입자 스크래치 (교체 주기와 무관)
    process: CMP
    equipment_group: CMP
    prob: 0.35
    telemetry_signature: {param: slurry_flow, drift: step_up}
    citation: "NO_CITATION"
  - cause: clean_brush_contact          # 세정 브러시 접촉 이상
    process: CLEAN
    equipment_group: CLEAN
    prob: 0.20
    telemetry_signature: {param: none, drift: none}   # 정비(브러시 교체) 이력에만 단서
    citation: "NO_CITATION"